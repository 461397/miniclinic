<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>醫師登入 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 400px; margin: 60px auto; padding: 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        .error-box { background: #FEE2E2; color: #991B1B; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        .error-text { color: #991B1B; font-size: 12px; display: block; margin-top: 4px; }
        .field { margin: 16px 0; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #14B8A6; color: white; padding: 10px 24px; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <h1>醫師登入</h1>
    <div th:if="${errorMessage}" class="error-box" th:text="${errorMessage}"></div>
    <form th:action="@{/login}" th:object="${loginForm}" method="post">
        <div class="field">
            <label>醫師編號</label>
            <input type="text" th:field="*{doctorId}" placeholder="例如: D001">
            <span th:if="${#fields.hasErrors('doctorId')}" th:errors="*{doctorId}" class="error-text"></span>
        </div>
        <div class="field">
            <label>密碼</label>
            <input type="password" th:field="*{password}">
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-text"></span>
        </div>
        <button type="submit">登入</button>
    </form>
    <p style="text-align: center;"><a th:href="@{/}">返回首頁</a></p>
</body>
</html>
