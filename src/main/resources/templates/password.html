<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密碼 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 400px; margin: 60px auto; padding: 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        .error-box { background: #FEE2E2; color: #991B1B; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        .success-box { background: #D1FAE5; color: #065F46; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        .field { margin: 16px 0; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #14B8A6; color: white; padding: 10px 24px; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <h1>修改密碼</h1>
    <p>目前登入：<span th:text="${loggedInDoctorName}"></span></p>

    <div th:if="${errorMessage}" class="error-box" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="success-box" th:text="${successMessage}"></div>

    <form th:action="@{/password}" method="post">
        <div class="field">
            <label>舊密碼</label>
            <input type="password" name="oldPassword" required>
        </div>
        <div class="field">
            <label>新密碼</label>
            <input type="password" name="newPassword" required>
        </div>
        <div class="field">
            <label>確認新密碼</label>
            <input type="password" name="confirmPassword" required>
        </div>
        <button type="submit">確認修改</button>
    </form>
    <p style="text-align: center;"><a th:href="@{/dashboard}">返回看板</a></p>
</body>
</html>
